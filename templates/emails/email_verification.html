<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f4f7fb; padding: 24px; color: #0f2746;">
    <div style="max-width: 620px; margin: 0 auto; background: #ffffff; border: 1px solid #dce7f3; border-radius: 12px; padding: 24px;">
        <h2 style="margin-top: 0; color: #00274d;">Verify Your Email</h2>
        <p>Hello {{ user.email }},</p>
        <p>Please verify your email for the <strong>{{ role_name }}</strong> portal.</p>
        <p style="margin: 20px 0;">
            <a href="{{ verify_link }}" style="display: inline-block; background: #003f7d; color: #ffffff; text-decoration: none; padding: 10px 16px; border-radius: 8px;">
                Verify Email Address
            </a>
        </p>
        <p>This link expires on <strong>{{ expires_at.strftime('%Y-%m-%d %H:%M:%S') }} UTC</strong>.</p>
        <p>If you did not create this account, you may ignore this email.</p>
        <p style="margin-bottom: 0;">WVSU Alumni Tracking System</p>
    </div>
</body>
</html>
