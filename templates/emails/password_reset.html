<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f4f7fb; padding: 24px; color: #0f2746;">
    <div style="max-width: 620px; margin: 0 auto; background: #ffffff; border: 1px solid #dce7f3; border-radius: 12px; padding: 24px;">
        <h2 style="margin-top: 0; color: #00274d;">Password Reset Request</h2>
        <p>Hello {{ user.email }},</p>
        <p>We received a request to reset your account password.</p>
        <p style="margin: 20px 0;">
            <a href="{{ reset_link }}" style="display: inline-block; background: #003f7d; color: #ffffff; text-decoration: none; padding: 10px 16px; border-radius: 8px;">
                Reset Password
            </a>
        </p>
        <p>This link will expire in {{ expires_hours }} hour(s).</p>
        <p>If you did not request this action, please ignore this message.</p>
        <p style="margin-bottom: 0;">WVSU Alumni Tracking System</p>
    </div>
</body>
</html>
