<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification Code</title>
</head>
<body style="margin:0; padding:24px; background:#f9fafb; font-family:Arial, sans-serif; color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px; border-collapse:collapse; background:#ffffff; border:1px solid #dbeafe; border-radius:16px; overflow:hidden;">
                    <tr>
                        <td style="padding:32px 28px; text-align:center;">
                            <p style="margin:0 0 12px; font-size:12px; letter-spacing:1.4px; text-transform:uppercase; color:#2563eb; font-weight:700;">WVSU {{ portal_name }} Portal</p>
                            <h1 style="margin:0 0 12px; font-size:24px; line-height:1.3; color:#111827;">Your verification code</h1>
                            <p style="margin:0 0 24px; font-size:15px; line-height:1.6; color:#4b5563;">
                                Use this one-time password to continue with your sign-in or account verification.
                            </p>

                            <div style="display:inline-block; min-width:220px; padding:18px 24px; margin:0 0 20px; border-radius:14px; background:#eff6ff; border:1px solid #bfdbfe;">
                                <div style="font-size:34px; line-height:1; letter-spacing:10px; text-indent:10px; font-weight:800; color:#2563eb;">{{ otp }}</div>
                            </div>

                            <p style="margin:0 0 8px; font-size:14px; color:#16a34a; font-weight:700;">
                                Expires in {{ expires_minutes }} minute(s)
                            </p>
                            <p style="margin:0; font-size:13px; line-height:1.6; color:#6b7280;">
                                Requested for {{ recipient_email }}. If you did not request this code, you can safely ignore this email.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
